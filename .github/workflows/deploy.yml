name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install exactly from the committed lockfile. react/react-dom are declared as
      # optional peerDependencies (Figma export quirk), so a plain `npm install` /
      # `--legacy-peer-deps` skips them and the build can't resolve react/jsx-runtime.
      # `npm ci` installs the full locked tree (which includes react), reproducing the
      # working local build.
      - run: npm ci

      - run: npm run build

      # SPA fallback: GitHub Pages has no rewrite rules, so a copy of index.html as
      # 404.html lets React Router (createBrowserRouter) resolve deep links / refreshes.
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
